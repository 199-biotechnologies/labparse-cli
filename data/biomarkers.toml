# =============================================================================
# DISAMBIGUATION TABLE
# =============================================================================
# These resolve ambiguous names that could map to multiple markers.
# The resolver checks value + unit to pick the right candidate.
#
# CRITICAL SAFETY: CRP/hsCRP disambiguation prevents false emergencies.
# Standard CRP 45 mg/L scored against hsCRP <0.5 = wrong!
# =============================================================================

[[disambiguation]]
ambiguous_name = "crp"
default_id = "hscrp"
candidates = [
    # hsCRP: values < 10 mg/L (typical range 0.1-3.0)
    { id = "hscrp", when_value_below = 10.0, when_unit_in = ["mg/L", "mg/dL"] },
    # Standard CRP: values >= 10 mg/L (acute inflammation)
    { id = "standard_crp", when_value_above = 10.0, when_unit_in = ["mg/L", "mg/dL"] },
]

