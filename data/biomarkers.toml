# =============================================================================
# labparse — Structured Biomarker Catalog
# =============================================================================
# Generated: 2026-03-26
# Design: Approved by Codex (GPT-5.4) + Gemini (3.1 Pro) + Claude review
#
# Each marker has:
#   id            — canonical identifier (matches labassess range names)
#   component     — full scientific name
#   specimen      — expected specimen type (serum, plasma, whole blood, etc.)
#   qualifier     — method/timing qualifier (fasting, high-sensitivity, etc.)
#   display_name  — human-readable name for reports
#   aliases       — all known names from partner labs (Clinilabs UK, Randox UK, Cerba IT, FML Dubai)
#   allowed_units — valid units for this marker (hard filter: reject mismatches)
#   loinc         — LOINC code (metadata only, not used for matching)
#   category      — clinical category
#
# SAFETY: NO Levenshtein matching. Exact aliases + normalization pipeline only.
# Dangerous near-collisions: TSH↔FSH, ALT↔AST, LDL↔HDL, T3↔T4, IgA↔IgG
# =============================================================================


